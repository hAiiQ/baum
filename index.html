<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bildanzeige</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #000;
      }

      img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
    </style>
  </head>
  <body>
    <img id="image" src="1.png" alt="" />

    <script>
      const image = document.querySelector("#image");

      setInterval(() => {
        image.src = `1.png?t=${Date.now()}`;
      }, 5000);
    </script>
  </body>
</html>
